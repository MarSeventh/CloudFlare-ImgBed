name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - dev  # 添加 dev 分支
  workflow_dispatch:
    inputs:
      worker_name:
        description: 'Worker Name'
        required: false
        default: ''
      environment:
        description: 'Deployment Environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 根据分支设置环境
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    
    steps:
      - name: Check deployment config
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured, skipping Worker deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci --omit=dev --omit=optional

      - name: Generate worker routes
        if: steps.check.outputs.skip != 'true'
        run: node deploy/worker/generate-routes.js

      - name: Generate wrangler config
        if: steps.check.outputs.skip != 'true'
        env:
          # 根据分支设置不同的 Worker 名称
          WORKER_NAME: ${{ 
            inputs.worker_name || 
            (github.ref_name == 'main' && secrets.WORKER_NAME_PROD) || 
            (github.ref_name == 'dev' && secrets.WORKER_NAME_DEV) || 
            secrets.WORKER_NAME 
          }}
          D1_DATABASE_ID: ${{ 
            github.ref_name == 'main' && secrets.D1_DATABASE_ID_PROD || 
            secrets.D1_DATABASE_ID_DEV 
          }}
          KV_NAMESPACE_ID: ${{ 
            github.ref_name == 'main' && secrets.KV_NAMESPACE_ID_PROD || 
            secrets.KV_NAMESPACE_ID_DEV 
          }}
          R2_BUCKET_NAME: ${{ 
            github.ref_name == 'main' && secrets.R2_BUCKET_NAME_PROD || 
            secrets.R2_BUCKET_NAME_DEV 
          }}
          AI_QUEUE_NAME: ${{ secrets.AI_QUEUE_NAME }}
          WORKER_VARS: ${{ 
            github.ref_name == 'main' && secrets.WORKER_VARS_PROD || 
            secrets.WORKER_VARS_DEV 
          }}
          ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        run: node deploy/worker/generate-config.js

      - name: Deploy to Cloudflare Workers
        if: steps.check.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config deploy/worker/wrangler.jsonc