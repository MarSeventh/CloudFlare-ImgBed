name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      worker_name:
        description: 'Worker Name (覆盖默认名称，注意：仅更改名称不会自动匹配数据库/KV绑定)'
        required: false
        default: ''

# 所有配置均通过 Secrets 传入
#
# 在仓库 Settings → Secrets and variables → Actions → Secrets 中配置：
#
# 必填：
#   CLOUDFLARE_API_TOKEN  - Cloudflare API Token（需要 Workers 编辑权限）
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare Account ID
#
# Worker 名称（每个环境独立）：
#   WORKER_NAME_PROD      - 生产环境 Worker 名称（main 分支）
#   WORKER_NAME_DEV       - 开发环境 Worker 名称（dev 分支）
#   WORKER_NAME           - 通用回退名称（其他分支）
#
# 数据库（每个环境独立）：
#   D1_DATABASE_ID_PROD   - 生产环境 D1 数据库 ID
#   D1_DATABASE_ID_DEV    - 开发环境 D1 数据库 ID
#   D1_DATABASE_ID        - 通用回退 D1 数据库 ID
#
#   KV_NAMESPACE_ID_PROD  - 生产环境 KV 命名空间 ID
#   KV_NAMESPACE_ID_DEV   - 开发环境 KV 命名空间 ID
#   KV_NAMESPACE_ID       - 通用回退 KV 命名空间 ID
#
#   R2_BUCKET_NAME_PROD   - 生产环境 R2 存储桶名称
#   R2_BUCKET_NAME_DEV    - 开发环境 R2 存储桶名称
#   R2_BUCKET_NAME        - 通用回退 R2 存储桶名称
#
# 可选：
#   AI_QUEUE_NAME         - AI 队列名称（所有环境共用）
#   WORKER_VARS_PROD      - 生产环境业务环境变量（JSON 格式）
#   WORKER_VARS_DEV       - 开发环境业务环境变量（JSON 格式）
#   WORKER_VARS           - 通用回退业务环境变量（JSON 格式）

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    
    steps:
      - name: Check deployment config
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not configured, skipping Worker deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Generate worker routes
        if: steps.check.outputs.skip != 'true'
        run: node deploy/worker/generate-routes.js

      - name: Generate wrangler config
        if: steps.check.outputs.skip != 'true'
        env:
          WORKER_NAME: ${{ inputs.worker_name || (github.ref_name == 'main' && secrets.WORKER_NAME_PROD) || (github.ref_name == 'dev' && secrets.WORKER_NAME_DEV) || secrets.WORKER_NAME }}
          D1_DATABASE_ID: ${{ (github.ref_name == 'main' && secrets.D1_DATABASE_ID_PROD) || (github.ref_name == 'dev' && secrets.D1_DATABASE_ID_DEV) || secrets.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ (github.ref_name == 'main' && secrets.KV_NAMESPACE_ID_PROD) || (github.ref_name == 'dev' && secrets.KV_NAMESPACE_ID_DEV) || secrets.KV_NAMESPACE_ID }}
          R2_BUCKET_NAME: ${{ (github.ref_name == 'main' && secrets.R2_BUCKET_NAME_PROD) || (github.ref_name == 'dev' && secrets.R2_BUCKET_NAME_DEV) || secrets.R2_BUCKET_NAME }}
          AI_QUEUE_NAME: ${{ secrets.AI_QUEUE_NAME }}
          WORKER_VARS: ${{ (github.ref_name == 'main' && secrets.WORKER_VARS_PROD) || (github.ref_name == 'dev' && secrets.WORKER_VARS_DEV) || secrets.WORKER_VARS }}
          ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'development' }}
        run: node deploy/worker/generate-config.js

      - name: Validate configuration
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ -z "$WORKER_NAME" ]; then
            echo "::error::WORKER_NAME is not set. Please configure WORKER_NAME_PROD, WORKER_NAME_DEV, or WORKER_NAME secret."
            exit 1
          fi
          echo "Deploying Worker: $WORKER_NAME"
          echo "Environment: $ENVIRONMENT"

      - name: Deploy to Cloudflare Workers
        if: steps.check.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.0.0'
          command: deploy --config deploy/worker/wrangler.jsonc
