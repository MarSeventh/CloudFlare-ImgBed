name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      worker_name:
        description: 'Worker Name (手动输入会覆盖自动配置)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    
    steps:
      - name: Check deployment config
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not configured, skipping Worker deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug - Show inputs and branch
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "🔍 Manual input worker_name: '${{ inputs.worker_name }}'"
          echo "🔍 Current branch: '${{ github.ref_name }}'"
          echo "🔍 Is manual input empty? ${{ inputs.worker_name == '' }}"

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Generate worker routes
        if: steps.check.outputs.skip != 'true'
        run: node deploy/worker/generate-routes.js || echo "⚠️  Skipping generate-routes.js"

      - name: Generate and validate wrangler config
        if: steps.check.outputs.skip != 'true'
        env:
          WORKER_NAME: ${{ inputs.worker_name || (github.ref_name == 'main' && secrets.WORKER_NAME_PROD) || (github.ref_name == 'dev' && secrets.WORKER_NAME_DEV) || secrets.WORKER_NAME || 'cfimgbed' }}
          D1_DATABASE_ID: ${{ (github.ref_name == 'main' && secrets.D1_DATABASE_ID_PROD) || (github.ref_name == 'dev' && secrets.D1_DATABASE_ID_DEV) || secrets.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ (github.ref_name == 'main' && secrets.KV_NAMESPACE_ID_PROD) || (github.ref_name == 'dev' && secrets.KV_NAMESPACE_ID_DEV) || secrets.KV_NAMESPACE_ID }}
          R2_BUCKET_NAME: ${{ (github.ref_name == 'main' && secrets.R2_BUCKET_NAME_PROD) || (github.ref_name == 'dev' && secrets.R2_BUCKET_NAME_DEV) || secrets.R2_BUCKET_NAME }}
          AI_QUEUE_NAME: ${{ secrets.AI_QUEUE_NAME }}
          WORKER_VARS: ${{ (github.ref_name == 'main' && secrets.WORKER_VARS_PROD) || (github.ref_name == 'dev' && secrets.WORKER_VARS_DEV) || secrets.WORKER_VARS }}
          ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'development' }}
        run: |
          echo "✅ Deploying Worker: $WORKER_NAME"
          echo "🌍 Environment: $ENVIRONMENT"
          echo "📝 Source: ${{ inputs.worker_name != '' && 'Manual Input' || 'Auto Config' }}"
          
          echo "📝 Generating wrangler.toml..."
          node deploy/worker/generate-toml.js

      - name: Deploy to Cloudflare Workers
        if: steps.check.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.0.0'
          command: deploy --config deploy/worker/wrangler.toml
